{{define "factory_displays"}}
    {{/*<h1>Factory Displays</h1>*/}}
    <div class="factory-display-container">
    {{range $i := .}}
        <div class="factory-display">
        {{range $j := $i.Tiles}}
            <div class="tile {{$j}}"></div>
        {{end}}
        </div>
    {{end}}
    </div>
{{end}}
